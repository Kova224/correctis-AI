name: correctis
description: "Correctis - Correction IA de copies par les enseignants (MVP)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # UI / fonts
  google_fonts: ^6.2.1

  # Camera & image handling
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Files & exports
  excel: ^4.0.6
  share_plus: ^10.0.2
  open_filex: ^4.5.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

  # Local persistence (cache, préférences UI)
  shared_preferences: ^2.3.2

  # Backend : Supabase (auth, postgres, storage)
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

# -----------------------------------------------------------------------------
# Configuration de l'icône de l'application (package flutter_launcher_icons).
# Placez le logo dans assets/icon/app_icon.png (1024x1024 recommandé), puis :
#   flutter pub get
#   dart run flutter_launcher_icons
# -----------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  # Icône adaptative Android (fond blanc + logo au centre)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

# -----------------------------------------------------------------------------
# Splash screen natif (écran affiché pendant le démarrage de l'app).
# Générer avec :
#   dart run flutter_native_splash:create
# -----------------------------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/app_icon.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/icon/app_icon.png
