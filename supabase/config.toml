# Configuration locale Supabase (CLI).
# Pour usage local seulement — la prod est configurée via le dashboard.
project_id = "correctis"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "correctis://login-callback"
additional_redirect_urls = [
  "correctis://login-callback",
  "correctis://login-callback/**",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false  # à activer dans le dashboard avec OAuth Client ID

[auth.external.facebook]
enabled = false

[edge_runtime]
enabled = true
port = 54324
